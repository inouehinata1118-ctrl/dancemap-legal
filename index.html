<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DanceMap</title>
<style>
  :root { --coral:#ED4A57; --blue:#24449f; --muted:#6b6b73; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,"Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif;
         background:#f6f7fb; color:#1c1c1e; }
  .hero { background:linear-gradient(135deg,var(--coral),var(--blue)); color:#fff;
          padding:64px 22px; text-align:center; }
  .hero h1 { margin:0; font-size:34px; letter-spacing:.02em; }
  .hero p { opacity:.92; margin-top:8px; font-size:15px; }
  main { max-width:640px; margin:0 auto; padding:30px 22px 60px; }
  .links a { display:block; background:#fff; border-radius:14px; padding:18px 20px; margin:12px 0;
             text-decoration:none; color:#1c1c1e; box-shadow:0 1px 4px rgba(0,0,0,.06);
             font-weight:600; display:flex; justify-content:space-between; align-items:center; }
  .links a:hover { box-shadow:0 2px 10px rgba(0,0,0,.12); }
  .links .arr { color:var(--coral); }
  footer { text-align:center; color:var(--muted); font-size:12px; padding:24px; }
</style>
</head>
<body>
<div class="hero">
  <h1>DanceMap</h1>
  <p>ダンスイベントをみつけよう</p>
</div>
<main>
  <div class="links">
    <a href="./privacy.html"><span>プライバシーポリシー</span><span class="arr">→</span></a>
    <a href="./terms.html"><span>利用規約</span><span class="arr">→</span></a>
  </div>
</main>
<footer>© 2026 dance map運営事務局</footer>
</body>
</html>
